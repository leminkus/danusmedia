<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DANUS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 600vh;
  background: #f4eddf;
  font-family: "Courier New", monospace;
  overflow-x: hidden;
}

/* 🧻 Rolle */
#container {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#roll {
  width: 60%;
  max-width: 600px;
}

/* 📄 TEXTBAND (wichtig!) */
#paper {
  position: fixed;

  /* 👉 leicht rechts der Mitte */
  left: 55%;
  top: 55%;
  transform: translate(-50%, -50%);

  width: 280px; /* schmaler Print-Look */

  color: #2f2f2f;
  font-family: "Courier New", monospace;

  line-height: 1.5;
  text-align: left;

  padding: 10px;
}

/* Typo */
#title {
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

#text {
  font-size: 14px;
  margin-bottom: 10px;
  white-space: pre-line;
}

#link a {
  color: #2f2f2f;
  text-decoration: underline;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="container">
  <img id="roll" src="1.png">
</div>

<div id="paper">
  <div id="title"></div>
  <div id="text"></div>
  <div id="link"></div>
</div>

<script>
const images = ["1.png","2.png","3.png","4.png","5.png","4.png","5.png"];

const states = [
	{
    title: "",
    text: "",
    link: ""
  },
  {
    title: "",
    text: "",
    link: ""
  },
  {
    title: "EARTH DISPATCH #001",
    text: "Global renewable energy\nreached new highs.",
    link: ""
  },
  { title: "JOIN DANUS",
    text: "Eine neue Kategorie:\nPositive Nachrichten auf hygienischem Tissue",
    link: "https://docs.google.com/presentation/d/1HuhF-YK5rzk8IIl6spGZwehMkBy3Iu6ZDjOTSxXEqjo/edit?usp=sharing"

  },
  {
    title: "FICTION LAYER",
    text: "Elrond reports\nfrom Earth systems.",
    link: ""
  },
  {title: "MEDIA ORG",
   text: "a new media organization focused on high quality news that improve your well-being"


  }
];

let current = -1;

const roll = document.getElementById("roll");
const title = document.getElementById("title");
const text = document.getElementById("text");
const link = document.getElementById("link");

function update(i) {
  roll.src = images[i];

  title.innerText = states[i].title;
  text.innerText = states[i].text;

  if (states[i].link) {
    link.innerHTML = `<a href="${states[i].link}" target="_blank">View Presentation</a>`;
  } else {
    link.innerHTML = "";
  }
}

window.addEventListener("scroll", () => {

  let scrollY = window.scrollY;
  let maxScroll = document.body.scrollHeight - window.innerHeight;
  let progress = scrollY / maxScroll;

  let index;

  // Phase 1: 0–80% → 1–5
  if (progress < 0.8) {
    index = Math.floor(progress / 0.8 * 5);
    if (index > 4) index = 4;
  }

  // Phase 2: loop 4–5
  else {
    let loopProgress = (progress - 0.8) / 0.2;
    index = loopProgress < 0.5 ? 3 : 4;
  }

  if (index !== current) {
    current = index;
    update(current);
  }
});
</script>

</body>
</html>
