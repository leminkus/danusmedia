<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DANUS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 600vh;
  background: #f4eddf;
  font-family: "Courier New", monospace;
  overflow-x: hidden;
}

#container {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#roll {
  width: 60%;
  max-width: 600px;
}

#textBox {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  color: #333;
  padding: 0 20px;
}

#title {
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

#text {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 10px;
}

#link a {
  color: #333;
  text-decoration: underline;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="container">
  <img id="roll" src="1.png">
</div>

<div id="textBox">
  <div id="title"></div>
  <div id="text"></div>
  <div id="link"></div>
</div>

<script>
const images = ["1.png","2.png","3.png","4.png","5.png"];

const states = [
  {
    title: "WELCOME TO DANUS",
    text: "A physical media system for positive information.",
    link: ""
  },
  {
    title: "EARTH DISPATCH #001",
    text: "Global renewable energy reached new highs.",
    link: ""
  },
  {
    title: "SCIENCE UPDATE",
    text: "AI systems improve early disease detection.",
    link: ""
  },
  {
    title: "FICTION LAYER",
    text: "Elrond reports from Earth observation systems.",
    link: ""
  },
  {
    title: "JOIN DANUS",
    text: "Eine neue Kategorie: Positive Nachrichten auf hygienischem Tissue",
    link: "https://docs.google.com/presentation/"
  }
];

let current = -1;

function update(i) {
  document.getElementById("roll").src = images[i];
  document.getElementById("title").innerText = states[i].title;
  document.getElementById("text").innerText = states[i].text;

  const linkEl = document.getElementById("link");

  if (states[i].link) {
    linkEl.innerHTML = `<a href="${states[i].link}" target="_blank">View Presentation</a>`;
  } else {
    linkEl.innerHTML = "";
  }
}

window.addEventListener("scroll", () => {

  let scrollY = window.scrollY;
  let maxScroll = document.body.scrollHeight - window.innerHeight;
  let progress = scrollY / maxScroll;

  let index;

  // 🟢 PHASE 1: 0–80% → 1–5
  if (progress < 0.8) {
    index = Math.floor(progress / 0.8 * 5);
    if (index > 4) index = 4;
  }

  // 🔵 PHASE 2: 80–100% → loop 4 ↔ 5
  else {
    let loopProgress = (progress - 0.8) / 0.2;
    index = loopProgress < 0.5 ? 3 : 4;
  }

  if (index !== current) {
    current = index;
    update(current);
  }
});
</script>

</body>
</html>
